fragment Build on Build {
  id
  uuid
  branch
  createdAt
  message
  number
  state
  url
  pipeline {
    name
    slug
  }
}

fragment JobStep on Step {
  key
  dependencies(first: 100) {
    edges {
      node {
        key
      }
    }
  }
}

fragment BuildJob on JobInterface {
  __typename
  ... on JobTypeCommand {
    id
    uuid
    label
    state
    url
    step {
      ...JobStep
    }
  }
  ... on JobTypeBlock {
    id
    uuid
    label
    state
    isUnblockable
    step {
      ...JobStep
    }
  }
  ... on JobTypeWait {
    id
    uuid
    label
    state
    step {
      ...JobStep
    }
  }
  ... on JobTypeTrigger {
    id
    uuid
    label
    state
    step {
      ...JobStep
    }
  }
}

query getBuild($uuid: ID!) {
  build(uuid: $uuid) {
    id
    uuid
    number
    state
    message
    branch
    url
    createdAt
    pipeline {
      name
      slug
    }
    jobs(first: 100) {
      count
      pageInfo {
        hasNextPage
      }
      edges {
        node {
          ...BuildJob
        }
      }
    }
  }
}

mutation unblockJob($id: ID!) {
  jobTypeBlockUnblock(input: { id: $id }) {
    jobTypeBlock {
      id
      state
    }
  }
}

query myBuilds {
  viewer {
    user {
      builds(first: 20) {
        edges {
          node {
            ...Build
          }
        }
      }
    }
  }
}

query listBuilds($pipeline: ID!) {
  pipeline(slug: $pipeline) {
    builds(first: 20) {
      edges {
        node {
          ...Build
        }
      }
    }
  }
}

fragment Pipeline on Pipeline {
  slug
  name
  description
  favorite
  url
  builds(first: 1) {
    edges {
      node {
        state
      }
    }
  }
}

query searchPipelines($org: ID!, $search: String) {
  organization(slug: $org) {
    pipelines(first: 20, archived: false, order: NAME_WITH_FAVORITES_FIRST, search: $search) {
      edges {
        node {
          ...Pipeline
        }
      }
    }
  }
}
